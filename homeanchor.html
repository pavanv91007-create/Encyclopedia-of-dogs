    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #ffe9d2 0, #f5f7fb 40%, #e3edf7 100%);
            color: #222;
            display: flex;
            justify-content: center;
            padding: 24px 12px;
            cursor: url("https://cur.cursors-4u.net/animals/ani-12/ani1150.png"), auto;
        }

        .wrapper {
            width: 100%;
            max-width: 1300px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            margin-top: 6px;
            color: #555;
        }

        .search-row {
            margin: 22px auto;
            max-width: 520px;
            display: flex;
            gap: 10px;
        }

        .search-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid #ccc;
            font-size: 0.95rem;
            outline: none;
            transition: box-shadow .2s, border-color .2s;
        }

        .search-row input:focus {
            border-color: #ff8a5c;
            box-shadow: 0 0 0 3px rgba(255, 138, 92, .25);
        }

        .search-row button {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            background: #ff8a5c;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: background  .2s, transform .1s, box-shadow .2s;
            box-shadow: 1px 1px 1px 1px black;
        }

        .search-row button:hover {
            background: #ff6a3a;
            transform: translateY(-1px);
        }

        .search-row button:active {
            transform: translateY(0);
            box-shadow: 0 3px 8px rgba(0, 0, 0, .18);
        }

        .letters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
            justify-content: center;
        }

        .letter-chip {
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid #ddd;
            font-size: 0.8rem;
            cursor: pointer;
            background: #fff;
            transition: background .2s, border-color .2s, color .2s, transform .1s;
        }

        .letter-chip:hover {
            background: #ffefe7;
            border-color: #ff8a5c;
            transform: translateY(-1px);
        }

        .letter-chip.active {
            background: #ff8a5c;
            border-color: #ff8a5c;
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 18px;
            perspective: 1000px;
        }

        .card {
            height: 420px;
            max-width: 280px;
            width: 100%;
            position: relative;
            will-change: transform;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            cursor: pointer;
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
        
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px  35px rgba(0, 0, 0, 0.738);
        }

        .card-face {
            position: relative;
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-front {
            justify-content: flex-start;
        }

        .card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .card-body {
            padding: 12px 13px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .card-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: #222;
        }

        .card-meta {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .card-details {
            font-size: 0.75rem;
            color: #666;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .card-details-item {
            margin-bottom: 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .card-details-label {
            font-weight: 600;
            color: #ff8a5c;
            min-width: fit-content;
        }

        .card-desc {
            font-size: 0.8rem;
            color: #555;
            line-height: 1.4;
            margin-top: auto;
            font-style: italic;
        }

        .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, .6);
            color: #fff;
            font-size: 0.75rem;
            padding: 3px 7px;
            border-radius: 999px;
            z-index: 2;
        }

        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #777;
            margin-top: 18px;
        }

        @media(max-width:600px) {
            h1 {
                font-size: 1.9rem;
            }

            .search-row {
                flex-direction: column;
            }

            .search-row button {
                width: 100%;
            }
        }
    </style>
</head>

        { n: "Poodle", l: "P", g: "Companion", d: "Intelligent curly-coated dog, comes in three sizes.", life: "12-15 years", height: "25-60 cm", weight: "3-32 kg" },
        { n: "Pug", l: "P", g: "Companion", d: "Wrinkled toy dog, charming and comical companion.", life: "12-15 years", height: "25-30 cm", weight: "6-8 kg" },
        { n: "Rottweiler", l: "R", g: "Working", d: "Powerful guardian, confident and loyal protector.", life: "8-11 years", height: "56-69 cm", weight: "34-59 kg" },
        { n: "Shiba Inu", l: "S", g: "Spitz", d: "Japanese spitz, bold and independent companion.", life: "12-16 years", height: "33-43 cm", weight: "6-10 kg" },
        { n: "Shih Tzu", l: "S", g: "Companion", d: "Tibetan lapdog, sweet and outgoing companion.", life: "10-18 years", height: "20-28 cm", weight: "4-7.5 kg" },
        { n: "Siberian Husky", l: "S", g: "Working", d: "Medium sled dog, energetic and social pack animal.", life: "12-14 years", height: "51-60 cm", weight: "16-27 kg" },
        { n: "Tibetan Mastiff", l: "T", g: "Guardian", d: "Ancient guardian, massive and independent protector.", life: "10-14 years", height: "61-71 cm", weight: "34-82 kg" },
        { n: "Vizsla", l: "V", g: "Sporting", d: "Hungarian pointer, affectionate and active hunter.", life: "12-15 years", height: "53-64 cm", weight: "18-30 kg" },
        { n: "Weimaraner", l: "W", g: "Sporting", d: "Gray ghost gundog, energetic and loyal companion.", life: "10-13 years", height: "56-69 cm", weight: "23-40 kg" },
        { n: "West Highland White Terrier", l: "W", g: "Terrier", d: "White terrier, bold and cheerful working dog.", life: "12-14 years", height: "25-28 cm", weight: "6.4-7 kg" },
        { n: "Yorkshire Terrier", l: "Y", g: "Toy", d: "Silky-coated toy terrier, lively and fearless.", life: "13-16 years", height: "20-23 cm", weight: "2.7-3.6 kg" }
];

const grid = document.getElementById("grid");
const searchInput = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearBtn");
const lettersContainer = document.getElementById("letters");
let activeLetter = null;

// 2. LOCALSTORAGE IMAGE CACHING
function getCachedImage(breedName) {
    return localStorage.getItem(`dog_image_${breedName}`);
}

function setCachedImage(breedName, imageUrl) {
    try {
        localStorage.setItem(`dog_image_${breedName}`, imageUrl);
    } catch (e) {
        console.log("LocalStorage full or disabled");
    }
}

// 3. THE DYNAMIC IMAGE FETCHER
async function getDogImage(breedName) {
    // Check cache first
    const cached = getCachedImage(breedName);
    if (cached) return cached;

    try {
        // Convert "Golden Retriever" to "retriever/golden" for the API
        const queryName = breedName.toLowerCase().split(' ').reverse().join('/');
        const response = await fetch(`https://dog.ceo/api/breed/${queryName}/images/random`);
        const data = await response.json();

        if (data.status === "success") {
            setCachedImage(breedName, data.message);
            return data.message;
        } else {
            // Fallback: If specific breed isn't in API, get any random dog
            const fallback = await fetch('https://dog.ceo/api/breeds/image/random');
            const fallbackData = await fallback.json();
            if (fallbackData.status === "success") {
                setCachedImage(breedName, fallbackData.message);
                return fallbackData.message;
            }
        }
    } catch (err) {
        const fallbackUrl = "https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=320&h=220";
        setCachedImage(breedName, fallbackUrl);
        return fallbackUrl;
    }
}

// 4. CARD GENERATOR
async function makeCard(b) {
    const card = document.createElement("div");
    card.className = "card";

    // Check if we have a cached image
    const cachedImage = getCachedImage(b.n);
    const imgUrl = cachedImage || "https://via.placeholder.com/320x220?text=Loading...";

    // We start with a loading placeholder or cached image
    card.innerHTML = `
<div class="card-face card-front">
    <div class="badge">${b.l}</div>
    <img src="${imgUrl}" alt="${b.n}" loading="lazy">
    <div class="card-body">
        <div class="card-title">${b.n}</div>
        <div class="card-meta">${b.g}</div>
        <div class="card-details">
            <div class="card-details-item"><span class="card-details-label">Lifespan:</span> ${b.life}</div>
            <div class="card-details-item"><span class="card-details-label">Height:</span> ${b.height}</div>
            <div class="card-details-item"><span class="card-details-label">Weight:</span> ${b.weight}</div>
        </div>
        <div class="card-desc">${b.d}</div>
    </div>
</div>
`;

    grid.appendChild(card);

    // Now, fetch the real image if not cached and update the card silently
    if (!cachedImage) {
        const realImgUrl = await getDogImage(b.n);
        const imgElement = card.querySelector('img');
        if (imgElement) imgElement.src = realImgUrl;
    }

    return card;
}

// 5. RENDERING ENGINE
function render(list) {
    grid.innerHTML = "";
    if (list.length === 0) {
        grid.innerHTML = '<p style="text-align:center; grid-column: 1 / -1; color:#777;">No breeds found.</p>';
        return;
    }
    list.forEach(b => makeCard(b));
}

function filterAndRender(query) {
    const q = query.trim().toLowerCase();
    if (!q) {
        render(breeds);
        return;
    }
    const filtered = breeds.filter(b =>
        b.n.toLowerCase().includes(q) ||
        b.l.toLowerCase() === q ||
        b.g.toLowerCase().includes(q) ||
        b.d.toLowerCase().includes(q)
    );
    render(filtered);
}

function renderLetters() {
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    lettersContainer.innerHTML = "";
    alphabet.forEach(letter => {
        const chip = document.createElement("button");
        chip.className = "letter-chip";
        chip.textContent = letter;
        chip.addEventListener("click", () => {
            if (activeLetter === letter) {
                activeLetter = null;
                chip.classList.remove("active");
                searchInput.value = "";
                render(breeds);
            } else {
                activeLetter = letter;
                Array.from(lettersContainer.children).forEach(c => c.classList.remove("active"));
                chip.classList.add("active");
                searchInput.value = "";
                const filtered = breeds.filter(b => b.l === letter);
                render(filtered);
            }
        });
        lettersContainer.appendChild(chip);
    });
}

// Event listeners
searchInput.addEventListener("input", () => {
    activeLetter = null;
    Array.from(lettersContainer.children).forEach(c => c.classList.remove("active"));
    filterAndRender(searchInput.value);
});

clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    activeLetter = null;
    Array.from(lettersContainer.children).forEach(c => c.classList.remove("active"));
    render(breeds);
});

// Initialize
renderLetters();
render(breeds);
</script>
