<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Indian Dog Breeds</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #ffe9d2 0, #f5f7fb 40%, #e3edf7 100%);
            color: #222;
            display: flex;
            justify-content: center;
            padding: 24px 12px;
            cursor: url("https://cur.cursors-4u.net/animals/ani-12/ani1150.png"), auto;
        }

        .wrapper {
            width: 100%;
            max-width: 1300px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            justify-items: center;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0, 0, 0, .08);
            transition: .2s;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, .15);
        }

        .card-img-wrap {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #f0f0f0;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .card-meta {
            font-size: 0.78rem;
            color: #555;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .card-meta strong {
            color: #ff8a5c;
        }

        .card-desc {
            font-size: 0.82rem;
            color: #444;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .med-box {
            background: #fff5f0;
            border-left: 3px solid #ff8a5c;
            padding: 8px 10px;
            border-radius: 0 8px 8px 0;
            margin-top: auto;
        }

        .med-box h4 {
            font-size: 0.75rem;
            color: #ff6a3a;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .med-box p {
            font-size: 0.76rem;
            color: #555;
            line-height: 1.35;
        }

        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #777;
            margin-top: 18px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <header>
            <h1>Indian Dog Breeds</h1>
        </header>

        <div id="grid" class="grid"></div>

        <div class="footer">Images cached locally after first load.</div>

    <script>
        const breeds = [
            { n: "Indian Pariah Dog (INDog)", g: "Primitive", h: "18–25 in", w: "33–66 lbs", l: "10–13 yrs", sp: "One of the oldest primitive breeds; highly adaptable and disease-resistant.", d: "Ancient native Indian breed, hardy and intelligent.", i: "https://via.placeholder.com/320x220?text=Indian+Pariah+Dog", med: "Very hardy; rarely needs medication. Keep up with annual rabies & DHPPi vaccines. Deworm every 3 months." },
            { n: "Indian Spitz", g: "Companion", h: "8–10 in", w: "11–44 lbs", l: "10–14 yrs", sp: "Bred from German Spitz; adapted perfectly to Indian climate.", d: "Small spitz, lively and playful, popular in India.", i: "https://via.placeholder.com/320x220?text=Indian+Spitz", med: "Watch for patellar luxation and dental issues. Use dental chews, joint supplements if needed, and regular flea/tick prevention." },
            { n: "Rajapalayam", g: "Sighthound", h: "25–30 in", w: "55–80 lbs", l: "9–13 yrs", sp: "Pure white hound used by Tamil Nadu royalty for boar hunting.", d: "Elegant white hound from Tamil Nadu, loyal guardian.", i: "https://via.placeholder.com/320x220?text=Rajapalayam", med: "Prone to deafness (white coat correlation) and skin allergies. Use vet-prescribed skin ointments and hearing checks yearly." },
            { n: "Mudhol Hound (Caravan Hound)", g: "Sighthound", h: "22–28 in", w: "48–62 lbs", l: "10–12 yrs", sp: "Bred by Deccan kings; one of the fastest Indian breeds.", d: "Slender hunting hound, fast and graceful.", i: "https://via.placeholder.com/320x220?text=Mudhol+Hound", med: "Sensitive to barbiturate anesthesia. Use sighthound-safe sedatives only. Watch for bloat; feed smaller meals." },
            { n: "Rampur Greyhound", g: "Sighthound", h: "24–30 in", w: "60–90 lbs", l: "9–12 yrs", sp: "Royal hound of Rampur; crossed from Afghan Hound & English Greyhound.", d: "Tall hound from Rampur, powerful and agile.", i: "https://via.placeholder.com/320x220?text=Rampur+Greyhound", med: "Osteosarcoma risk. Provide glucosamine supplements, avoid obesity, and schedule annual X-rays for bone health." },
            { n: "Kombai (Polygar Hound)", g: "Guardian", h: "23–26 in", w: "55–77 lbs", l: "9–13 yrs", sp: "Ancient war dog of Tamil chieftains; fearless against leopards.", d: "Strong guardian dog from Tamil Nadu, fearless.", i: "https://via.placeholder.com/320x220?text=Kombai", med: "Generally robust. Watch for mange in humid climates. Use ivermectin-based treatments and maintain coat hygiene." },
            { n: "Chippiparai", g: "Sighthound", h: "24–27 in", w: "33–48 lbs", l: "12–15 yrs", sp: "Royal dog of Madurai; used to hunt deer and hare.", d: "Slim hound from Tamil Nadu, fast and loyal.", i: "https://via.placeholder.com/320x220?text=Chippiparai", med: "Thin coat makes it prone to ticks. Use oral Bravecto or Nexgard monthly, and vitamin E oil for skin nourishment." },
            { n: "Kanni", g: "Sighthound", h: "25–29 in", w: "35–48 lbs", l: "12–15 yrs", sp: "Rare black-and-tan hound; used for coursing hares.", d: "Rare hound from Tamil Nadu, elegant and devoted.", i: "https://via.placeholder.com/320x220?text=Kanni", med: "Sensitive to cold. Use warm bedding in winter. Ensure calcium supplementation during growth to prevent rickets." },
            { n: "Bully Kutta (Indian Mastiff)", g: "Mastiff", h: "30–34 in", w: "150–170 lbs", l: "8–10 yrs", sp: "Descended from Alaunt war dogs; used for guarding and fighting.", d: "Large mastiff-type, powerful and protective.", i: "https://via.placeholder.com/320x220?text=Bully+Kutta", med: "High risk of hip dysplasia and heart issues. Give chondroitin supplements and schedule annual cardiac screening (ECG)." },
            { n: "Gaddi Kutta (Himalayan Sheepdog)", g: "Guardian", h: "24–30 in", w: "77–99 lbs", l: "10–11 yrs", sp: "Sheep guardian of Himalayan shepherds; can fight snow leopards.", d: "Mountain guardian dog, fluffy and strong.", i: "https://via.placeholder.com/320x220?text=Gaddi+Kutta", med: "Tibetan Mastiff ancestry brings hip dysplasia risk. Use glucosamine, omega-3 fish oil, and anti-fungal shampoos for thick coat." },
            { n: "Bakharwal Dog", g: "Guardian", h: "24–30 in", w: "60–90 lbs", l: "10–12 yrs", sp: "Ancient tribal dog of Gujjars; guards livestock in Pir Panjal.", d: "Himalayan livestock guardian, loyal and brave.", i: "https://via.placeholder.com/320x220?text=Bakharwal+Dog", med: "Rare genetic bottleneck causes eye disorders. Monitor for cataracts; use antioxidant eye drops and DNA testing if available." },
            { n: "Jonangi", g: "Hunting", h: "17–21 in", w: "28–48 lbs", l: "10–14 yrs", sp: "Unique yodel instead of bark; nearly extinct duck-herding dog.", d: "Rare Indian breed, short coat, used for hunting.", i: "https://via.placeholder.com/320x220?text=Jonangi", med: "Short coat leads to sunburn. Apply dog-safe sunscreen before outdoor activity. Deworm regularly due to hunting lifestyle." },
            { n: "Pandikona", g: "Guardian", h: "19–22 in", w: "44–55 lbs", l: "10–13 yrs", sp: "Village dog of Kurnool; naturally selected for survival in harsh terrain.", d: "Village guardian dog, hardy and protective.", i: "https://via.placeholder.com/320x220?text=Pandikona", med: "Extremely hardy; minimal meds needed. Standard 7-in-1 vaccination, annual rabies booster, and quarterly deworming suffice." },
            { n: "Kaikadi", g: "Hound", h: "15–19 in", w: "33–44 lbs", l: "12–14 yrs", sp: "Named after Kaikadi tribe; excellent rat-hunter and watchdog.", d: "Small hound from Maharashtra, agile and alert.", i: "https://via.placeholder.com/320x220?text=Kaikadi", med: "Terrier-like energy can cause ACL tears. Maintain lean weight, use joint supplements after age 7, and monitor dental tartar." },
            { n: "Tangkhul Hui (Haofa)", g: "Hunting", h: "18–22 in", w: "35–55 lbs", l: "10–12 yrs", sp: "Manipur tribal hound; used in group hunts for boar and deer.", d: "Breed from Manipur, loyal hunting companion.", i: "https://via.placeholder.com/320x220?text=Tangkhul+Hui", med: "Jungle exposure risks leptospirosis. Give annual leptospirosis vaccine, tick prevention, and anti-malarial prophylaxis if endemic." },
            { n: "Vikhan Sheepdog", g: "Guardian", h: "26–30 in", w: "70–90 lbs", l: "10–12 yrs", sp: "Rare Punjabi shepherd dog; closely related to Central Asian Ovcharkas.", d: "Rare sheepdog from Punjab, protective and strong.", i: "https://via.placeholder.com/320x220?text=Vikhan+Sheepdog", med: "Large size risks bloat. Feed raised bowls, avoid exercise after meals. Use gastroprotectants if gastric distress occurs." },
            { n: "Kumaon Mastiff", g: "Mastiff", h: "28–32 in", w: "120–160 lbs", l: "8–10 yrs", sp: "Near-extinct molosser of Uttarakhan hills; powerful guardian instinct.", d: "Large mastiff from Uttarakhand, powerful guardian.", i: "https://via.placeholder.com/320x220?text=Kumaon+Mastiff", med: "Prone to elbow dysplasia and obesity. Strict portion control, glucosamine, and low-impact exercise recommended." },
            { n: "Sinhala Hound", g: "Hound", h: "20–24 in", w: "33–55 lbs", l: "11–13 yrs", sp: "Ancient Sri Lankan breed; shares ancestry with Indian Pariah dogs.", d: "Ancient hound from Sri Lanka, related to Indian breeds.", i: "https://via.placeholder.com/320x220?text=Sinhala+Hound", med: "Heat tolerance is high but ticks are common. Use monthly spot-on fipronil, and monitor for ehrlichiosis symptoms (fever, lethargy)." },
            { n: "Mahratta Greyhound", g: "Sighthound", h: "22–26 in", w: "33–55 lbs", l: "10–12 yrs", sp: "Rare sighthound from Maharashtra; bred for coursing in arid regions.", d: "Rare hound from Maharashtra, fast and elegant.", i: "https://via.placeholder.com/320x220?text=Mahratta+Greyhound", med: "Lean build risks hypoglycemia. Feed small frequent meals. Use iron supplements if anemic and maintain hydration in heat." },
            { n: "Gull Dong", g: "Mastiff", h: "28–34 in", w: "120–180 lbs", l: "8–10 yrs", sp: "Pakistani cross of Bully Kutta & Gull Terr; explosive power.", d: "Cross of Bully Kutta and Terrier, strong and aggressive.", i: "https://via.placeholder.com/320x220?text=Gull+Dong", med: "Skin fold dermatitis is common. Clean folds daily with chlorhexidine wipes, use medicated shampoo weekly, and monitor heart health." },
            { n: "Gull Terrier", g: "Terrier", h: "18–22 in", w: "55–77 lbs", l: "11–14 yrs", sp: "Direct descendant of British Bull Terrier; muscular watchdog.", d: "Crossbreed terrier, muscular and protective.", i: "https://via.placeholder.com/320x220?text=Gull+Terrier", med: "Deafness and skin allergies frequent. Perform BAER test, use hypoallergenic diet if itching persists, and zinc supplements for coat." }
        ];

        const grid = document.getElementById("grid");

        async function getDogImage(breedName) {
            const cacheKey = 'dogImg_' + breedName;
            const cached = localStorage.getItem(cacheKey);
            if (cached) return cached;

            try {
                const queryName = breedName.toLowerCase().split(' ').reverse().join('/');
                const response = await fetch(`https://dog.ceo/api/breed/${queryName}/images/random`);
                const data = await response.json();

                if (data.status === "success") {
                    localStorage.setItem(cacheKey, data.message);
                    return data.message;
                } else {
                    const fallback = await fetch('https://dog.ceo/api/breeds/image/random');
                    const fallbackData = await fallback.json();
                    localStorage.setItem(cacheKey, fallbackData.message);
                    return fallbackData.message;
                }
            } catch (err) {
                const fallbackUrl = "https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=320&h=220";
                localStorage.setItem(cacheKey, fallbackUrl);
                return fallbackUrl;
            }
        }

        async function makeCard(b) {
            const card = document.createElement("div");
            card.className = "card";

            const cacheKey = 'dogImg_' + b.n;
            const cachedUrl = localStorage.getItem(cacheKey);
            const imgSrc = cachedUrl || b.i;

            card.innerHTML = `
                <div class="card-img-wrap">
                    <img src="${imgSrc}" alt="${b.n}">
                </div>
                <div class="card-body">
                    <div class="card-title">${b.n}</div>
                    <div class="card-meta">
                        <strong>Group:</strong> ${b.g} &nbsp;|&nbsp; 
                        <strong>H:</strong> ${b.h} &nbsp;|&nbsp; 
                        <strong>W:</strong> ${b.w} &nbsp;|&nbsp; 
                        <strong>Life:</strong> ${b.l}
                    </div>
                    <div class="card-desc"><strong>Specialty:</strong> ${b.sp}</div>
                    <div class="card-desc">${b.d}</div>
                    <div class="med-box">
                        <h4>Health & Medicine</h4>
                        <p>${b.med}</p>
                    </div>
            `;

            if (!cachedUrl) {
                const realImgUrl = await getDogImage(b.n);
                const imgElement = card.querySelector('img');
                if (imgElement) imgElement.src = realImgUrl;
            }

            return card;
        }

        async function render(list) {
            grid.innerHTML = "";
            for (const b of list) {
                const card = await makeCard(b);
                grid.appendChild(card);
            }
        }

        render(breeds);
    </script>
</body>

</html>
