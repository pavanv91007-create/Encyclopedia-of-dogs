<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Indian Dog Breeds</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #ffe9d2 0, #f5f7fb 40%, #e3edf7 100%);
            color: #222;
            display: flex;
            justify-content: center;
            padding: 24px 12px;
            cursor: url("https://cur.cursors-4u.net/animals/ani-12/ani1150.png"), auto;
        }

        .wrapper {
            width: 100%;
            max-width: 1300px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .search-row {
            margin: 16px auto 20px;
            max-width: 500px;
            display: flex;
            gap: 10px;
        }

        .search-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid #ccc;
            font-size: 0.9rem;
        }

        .search-row input:focus {
            outline: none;
            border-color: #ff8a5c;
            box-shadow: 0 0 0 3px rgba(255, 138, 92, .25);
        }

        .search-row button {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            background: #ff8a5c;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        .search-row button:hover {
            background: #ff6a3a;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            justify-items: center;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0, 0, 0, .08);
            transition: .2s;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, .15);
        }

        .card-img-wrap {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .img-placeholder {
            font-size: 0.75rem;
            color: #aaa;
            text-align: center;
            padding: 10px;
        }

        .card-body {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wiki-link {
            font-size: 0.72rem;
            color: #ff8a5c;
            text-decoration: none;
            font-weight: 500;
            border: 1px solid #ff8a5c;
            padding: 2px 6px;
            border-radius: 4px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .wiki-link:hover {
            background: #ff8a5c;
            color: #fff;
        }

        .card-meta {
            font-size: 0.78rem;
            color: #555;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .card-meta strong {
            color: #ff8a5c;
        }

        .card-desc {
            font-size: 0.82rem;
            color: #444;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .med-box {
            background: #fff5f0;
            border-left: 3px solid #ff8a5c;
            padding: 8px 10px;
            border-radius: 0 8px 8px 0;
            margin-top: auto;
        }

        .med-box h4 {
            font-size: 0.75rem;
            color: #ff6a3a;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .med-box p {
            font-size: 0.76rem;
            color: #555;
            line-height: 1.35;
        }

        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #777;
            margin-top: 18px;
        }
    </style>
</head>

<body>

        <div id="grid" class="grid"></div>

        <div class="footer">Images sourced from Wikipedia Commons via Wikipedia REST API.</div>

            }

        // Cache for fetched image URLs so re-filtering doesn't re-fetch
        const imgCache = {};

        function getReliableImageUrl(imageUrl) {
            if (!imageUrl) return "";
            return imageUrl;
        }

        // Fetch thumbnail from Wikipedia's open CORS REST API
        async function getWikiImage(wikiTitle, fallbackPhoto = "") {
            if (imgCache[wikiTitle] !== undefined) return imgCache[wikiTitle];

            if (fallbackPhoto) {
                imgCache[wikiTitle] = fallbackPhoto;
                return fallbackPhoto;
            }

            try {
                const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error("bad response");
                const data = await res.json();
                const src = data.originalimage?.source || data.thumbnail?.source || "";
                const reliableSrc = getReliableImageUrl(src);
                imgCache[wikiTitle] = reliableSrc;
                return reliableSrc;
            } catch (e) {
                imgCache[wikiTitle] = "";
                return "";
            }
        }

        const grid = document.getElementById("grid");
        const searchInput = document.getElementById("searchInput");
        const clearBtn = document.getElementById("clearBtn");

        function makeCard(b, imgSrc) {
            const card = document.createElement("div");
            card.className = "card";
            const imgHtml = imgSrc
                ? `<img src="${imgSrc}" alt="${b.n}">`
                : `<div class="img-placeholder">📷 Loading...</div>`;

            card.innerHTML = `
                <div class="card-img-wrap">
                    ${imgHtml}
                </div>
                <div class="card-body">
                    <div class="card-title">
                        <span>${b.n}</span>
                        <a href="${b.wikiUrl}" target="_blank" class="wiki-link" title="View on Wikipedia">Wiki ↗</a>
                    </div>
                    <div class="card-meta">
                        <strong>Group:</strong> ${b.g} &nbsp;|&nbsp;
                        <strong>H:</strong> ${b.h} &nbsp;|&nbsp;
                        <strong>W:</strong> ${b.w} &nbsp;|&nbsp;
                        <strong>Life:</strong> ${b.l}
                    </div>
                    <div class="card-desc"><strong>Specialty:</strong> ${b.sp}</div>
                    <div class="card-desc">${b.d}</div>
                    <div class="med-box">
                        <h4>Health &amp; Medicine</h4>
                        <p>${b.med}</p>
                    </div>
                </div>
            `;
            return card;
        }

        async function render(list) {
            grid.innerHTML = "";
            // First pass: render all cards immediately (cached or placeholder)
            const cards = list.map(b => {
                const cached = imgCache[b.wiki] || "";
                const card = makeCard(b, cached);
                grid.appendChild(card);
                return { b, card };
            });

            // Second pass: fetch missing images in parallel, inject when ready
            await Promise.all(cards.map(async ({ b, card }) => {
                if (imgCache[b.wiki]) return; // already cached
                const src = await getWikiImage(b.wiki, b.photo || "");
                const wrap = card.querySelector(".card-img-wrap");
                if (wrap) {
                    wrap.innerHTML = src
                        ? `<img src="${src}" alt="${b.n}">`
                        : `<div class="img-placeholder">Image unavailable</div>`;
                }
            }));
        }

        function filter() {
            const q = searchInput.value.trim().toLowerCase();
            const res = breeds.filter(b =>
                (b.n + " " + b.g + " " + b.d + " " + b.med).toLowerCase().includes(q)
            );
            render(res);
        }

        searchInput.addEventListener("input", filter);
        clearBtn.addEventListener("click", () => { searchInput.value = ""; render(breeds); });
        render(breeds);
    </script>
</body>

</html>
