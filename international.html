<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Popular International Dog Breeds Commonly Seen In India</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fff7f0, #e8f0ff);
            display: flex;
            justify-content: center;
            padding: 20px;
            cursor: url("https://cur.cursors-4u.net/animals/ani-12/ani1150.png"), auto;
        }

        .wrapper {
            width: 100%;
            max-width: 1200px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            margin-top: 6px;
            color: #555;
        }

        .search-row {
            margin: 20px auto;
            max-width: 500px;
            display: flex;
            gap: 10px;
        }

        .search-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid #ccc;
        }

        .search-row input:focus {
            border-color: #ff8a5c;
            box-shadow: 0 0 0 3px rgba(255, 138, 92, .25);
        }

        .search-row button {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            background: #ff8a5c;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        .search-row button:hover {
            background: #ff6a3a;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            justify-items: center;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0, 0, 0, .08);
            transition: .2s;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, .15);
        }

        .card-img-wrap {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .img-placeholder {
            font-size: 0.75rem;
            color: #aaa;
            text-align: center;
            padding: 10px;
        }

        .card-body {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .card-meta {
            font-size: 0.78rem;
            color: #555;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .card-meta strong {
            color: #ff8a5c;
        }

        .card-desc {
            font-size: 0.82rem;
            color: #444;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .med-box {
            background: #fff5f0;
            border-left: 3px solid #ff8a5c;
            padding: 8px 10px;
            border-radius: 0 8px 8px 0;
            margin-top: auto;
        }

        .med-box h4 {
            font-size: 0.75rem;
            color: #ff6a3a;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .med-box p {
            font-size: 0.76rem;
            color: #555;
            line-height: 1.35;
        }

        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <header>
            <h1>Popular International Dog Breeds Commonly Seen In India</h1>
            <p>Explore well-known breeds with detailed health &amp; care info.</p>
        </header>

        <div class="search-row">
            <input id="searchInput" type="text" placeholder="Search by breed name...">
            <button id="clearBtn">Clear</button>
        </div>

        <div id="grid" class="grid"></div>

        <div class="footer">Images sourced from Wikipedia Commons.</div>
    </div>

    <script>
        // wiki = exact Wikipedia article title used to fetch the thumbnail via Wikipedia API
        const breeds = [
            {
                n: "Labrador Retriever",
                g: "Sporting",
                h: "21-24 in",
                w: "55-80 lbs",
                l: "10-12 yrs",
                sp: "Friendly, intelligent, energetic",
                d: "Popular retriever known for loyalty and trainability; great family companion.",
                wiki: "Labrador_Retriever",
                med: "Tip: Regular vet checkups, balanced diet, and daily exercise."
            },
            {
                n: "German Shepherd",
                g: "Herding",
                h: "22-26 in",
                w: "50-90 lbs",
                l: "7-10 yrs",
                sp: "Intelligent, loyal, protective",
                d: "Working breed famous for obedience and strong guarding instincts.",
                wiki: "German_Shepherd",
                med: "Tip: Focus on training + mental stimulation."
            },
            {
                n: "Golden Retriever",
                g: "Sporting",
                h: "21-24 in",
                w: "55-75 lbs",
                l: "10-12 yrs",
                sp: "Friendly, devoted",
                d: "Gentle and outgoing companion, often chosen for therapy work.",
                wiki: "Golden_Retriever",
                med: "Tip: Watch coat care (brushing) and hip health."
            },
            {
                n: "Pug",
                g: "Companion",
                h: "10-13 in",
                w: "14-18 lbs",
                l: "13-15 yrs",
                sp: "Charming, mischievous",
                d: "Small breed with a big personality and affectionate nature.",
                wiki: "Pug",
                med: "Tip: Manage breathing/heat sensitivity and keep wrinkles clean."
            },
            {
                n: "Beagle",
                g: "Hound",
                h: "13-15 in",
                w: "20-30 lbs",
                l: "10-15 yrs",
                sp: "Merry, friendly, curious",
                d: "Scent hound known for nose-first exploration and friendly behavior.",
                wiki: "Beagle",
                med: "Tip: Regular dental care + scent-safe exercise."
            },
            {
                n: "Dachshund",
                g: "Hound",
                h: "8-9 in",
                w: "16-32 lbs",
                l: "12-16 yrs",
                sp: "Clever, lively",
                d: "Low-to-the-ground breed with strong digging instincts.",
                wiki: "Dachshund",
                med: "Tip: Support joints/spine; avoid jumping."
            },
            {
                n: "Boxer",
                g: "Working",
                h: "21-25 in",
                w: "50-70 lbs",
                l: "10-12 yrs",
                sp: "Playful, energetic, loyal",
                d: "Athletic and fun-loving companion with protective loyalty.",
                wiki: "Boxer_dog",
                med: "Tip: Provide routine exercise + heartworm prevention."
            },
            {
                n: "Rottweiler",
                g: "Working",
                h: "22-27 in",
                w: "80-135 lbs",
                l: "8-10 yrs",
                sp: "Loyal, confident, strong",
                d: "Large guardian breed—needs training, structure, and socialization.",
                wiki: "Rottweiler",
                med: "Tip: Proper nutrition + weight management."
            },
            {
                n: "Dobermann",
                g: "Working",
                h: "24-28 in",
                w: "60-100 lbs",
                l: "10-12 yrs",
                sp: "Fearless, alert",
                d: "Highly driven and intelligent; thrives with consistent training.",
                wiki: "Dobermann",
                med: "Tip: Monitor heart health and provide mental challenge."
            },
            {
                n: "Great Dane",
                g: "Working",
                h: "28-34 in",
                w: "100-200 lbs",
                l: "7-10 yrs",
                sp: "Gentle, friendly, giant",
                d: "Huge companion breed that still needs careful exercise and diet.",
                wiki: "Great_Dane",
                med: "Tip: Slow-feeding + manage bloat risk."
            },
            {
                n: "Dalmatian",
                g: "Sporting",
                h: "19-23 in",

                d: "Iconic spotted breed—requires active lifestyle.",

            },
            {
                n: "Siberian Husky",
                g: "Working",
                h: "20-24 in",
                w: "35-60 lbs",
                l: "12-14 yrs",

                d: "Endurance sled dog with striking eyes and high energy.",
                wiki: "Siberian_Husky",
                med: "Tip: Provide mental + physical activity and coat care."
            },
            {
                n: "Shih Tzu",
                g: "Companion",
                h: "9-10 in",
                w: "9-16 lbs",

                sp: "Affectionate, lively",
                d: "Small companion dog with long, luxurious coat.",
                wiki: "Shih_Tzu",
                med: "Tip: Grooming routine + eye/tear stain care."
            },
            {
                n: "Pomeranian",
                g: "Toy",
                h: "8-11 in",
                w: "3-7 lbs",
                l: "12-16 yrs",
                sp: "Bold, lively",
                d: "Tiny spitz with big confidence and fluffy coat.",
                wiki: "Pomeranian_dog",
                med: "Tip: Dental care and consistent grooming."
            },
            {
                n: "Chihuahua",
                g: "Toy",
                h: "6-9 in",
                w: "2-6 lbs",
                l: "14-16 yrs",
                sp: "Alert, courageous",
                d: "Small but fearless companion—great for attentive owners.",
                wiki: "Chihuahua_(dog)",
                med: "Tip: Watch portion size and dental health."
            },
            {
                n: "English Cocker Spaniel",
                g: "Sporting",
                h: "14-15 in",
                w: "20-30 lbs",
                l: "10-14 yrs",
                sp: "Gentle, affectionate",
                d: "Sporting dog with friendly temperament and silky coat.",
                wiki: "English_Cocker_Spaniel",
                med: "Tip: Ear care + coat brushing."
            },
            {
                n: "English Bulldog",
                g: "Non-Sporting",
                h: "14-15 in",
                w: "40-51 lbs",
                l: "8-10 yrs",
                sp: "Friendly, courageous",
                d: "Wrinkly companion breed with a calm, stubborn charm.",
                wiki: "Bulldog",
                med: "Tip: Skin fold cleaning + breathing awareness."
            },
            {
                n: "French Bulldog",
                g: "Non-Sporting",
                h: "11-12 in",
                w: "20-28 lbs",
                l: "10-12 yrs",
                sp: "Playful, smart",
                d: "Low-exercise, high-love companion with bat ears.",
                wiki: "French_Bulldog",
                med: "Tip: Heat sensitivity—avoid overexertion."
            },
            {
                n: "Saint Bernard",
                g: "Working",
                h: "26-30 in",
                w: "120-180 lbs",
                l: "8-10 yrs",
                sp: "Gentle, friendly giant",
                d: "Big-hearted rescue breed needing structured care.",
                wiki: "St._Bernard_(dog)",
                med: "Tip: Weight management + regular vet checkups."
            }
        ];

        // Cache for fetched image URLs so we don't re-fetch on search filter
        const imgCache = {};

        // Fetch thumbnail from Wikipedia's open CORS API
        async function getWikiImage(wikiTitle) {
            if (imgCache[wikiTitle]) return imgCache[wikiTitle];
            try {
                const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error("bad response");
                const data = await res.json();
                const src = data.originalimage?.source || data.thumbnail?.source || "";
                imgCache[wikiTitle] = src;
                return src;
            } catch (e) {
                imgCache[wikiTitle] = "";
                return "";
            }
        }

        const grid = document.getElementById("grid");
        const searchInput = document.getElementById("searchInput");
        const clearBtn = document.getElementById("clearBtn");

        function makeCard(b, imgSrc) {
            const c = document.createElement("div");
            c.className = "card";
            const imgHtml = imgSrc
                ? `<img src="${imgSrc}" alt="${b.n}" loading="lazy">`
                : `<div class="img-placeholder">📷 Loading...</div>`;

            c.innerHTML = `
                <div class="card-img-wrap" id="imgwrap-${b.wiki}">
                    ${imgHtml}
                </div>
                <div class="card-body">
                    <div class="card-title">${b.n}</div>
                    <div class="card-meta">
                        <strong>Group:</strong> ${b.g} &nbsp;|&nbsp;
                        <strong>H:</strong> ${b.h} &nbsp;|&nbsp;
                        <strong>W:</strong> ${b.w} &nbsp;|&nbsp;
                        <strong>Life:</strong> ${b.l}
                    </div>
                    <div class="card-desc"><strong>Specialty:</strong> ${b.sp}</div>
                    <div class="card-desc">${b.d}</div>
                    <div class="med-box">
                        <h4>Health &amp; Medicine</h4>
                        <p>${b.med}</p>
                    </div>
                </div>
            `;
            return c;
        }

        async function render(list) {
            grid.innerHTML = "";
            // First pass: render all cards immediately with placeholder
            const cards = list.map(b => {
                const cached = imgCache[b.wiki] || "";
                const card = makeCard(b, cached);
                grid.appendChild(card);
                return { b, card };
            });

            // Second pass: fetch images and inject them (parallel)
            await Promise.all(cards.map(async ({ b, card }) => {
                if (imgCache[b.wiki]) return; // already have it
                const src = await getWikiImage(b.wiki);
                const wrap = card.querySelector(".card-img-wrap");
                if (wrap) {
                    wrap.innerHTML = src
                        ? `<img src="${src}" alt="${b.n}" loading="lazy">`
                        : `<div class="img-placeholder">Image unavailable</div>`;
                }
            }));
        }

        function filter() {
            const q = searchInput.value.trim().toLowerCase();
            const res = breeds.filter(b =>
                (b.n + " " + b.g + " " + b.d + " " + b.med).toLowerCase().includes(q)
            );
            render(res);
        }

        searchInput.addEventListener("input", filter);
        clearBtn.addEventListener("click", () => { searchInput.value = ""; render(breeds); });
        render(breeds);
    </script>
</body>

</html>
