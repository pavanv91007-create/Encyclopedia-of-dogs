<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #fff7f0, #ffe9d2, #e8f0ff);
        }

        .container {
            display: grid;
            grid-template-areas:
                "header header"
                "menu information";
            grid-template-columns: 1fr 4fr;
            grid-template-rows: 70px 1fr;
            height: 100vh;
            width: 100vw;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            grid-area: header;
            background: linear-gradient(90deg, #ff8a5c, #ff6a3a);
            backdrop-filter: blur(5px);
            color: white;
            display: flex;
            align-items: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .menu {
            grid-area: menu;
            background: linear-gradient(180deg, #5a2a2a, #8b3d3d);
            color: white;
            padding: 20px;
            animation: slideLeft 0.8s ease;
        }

        @keyframes slideLeft {
            from {
                transform: translateX(-50px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .menu ul {
            margin-top: 20px;
        }

        .menu li {
            list-style: none;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 6px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .menu li:hover {
            background: #ff8a5c;
            color: #fff;
            transform: translateX(8px) scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 138, 92, 0.5);
            border-color: #ff8a5c;
        }

        .menu a {
            color: inherit;
            text-decoration: none;
            display: block;
        }

        .information {
            grid-area: information;
            background-image: url("bgmig2.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
            position: relative;
            animation: fadeIn 1.2s ease;
        }

        .information::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 138, 92, 0.25), transparent 60%);
            animation: moveGlow 8s infinite linear;
        }

        @keyframes moveGlow {
            0% {
                transform: translate(-20%, -20%);
            }

            50% {
                transform: translate(20%, 20%);
            }

            100% {
                transform: translate(-20%, -20%);
            }
        }

        .information iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: relative;
            z-index: 2;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            Dashboard
        </div>

        <div class="menu">
            <ul>
                <li><a href="homeanchor.html" target="content-frame">Home</a></li>
                <li><a href="indian.html" target="content-frame">Indian types</a></li>
                <li><a href="international.html" target="content-frame">INTERNATIONAL TYPES</a></li>
                <li><a href="top10.html" target="content-frame">TOP 10 OF ALL</a></li>
                <li><a href="store.html" target="content-frame">STORE</a></li>
            </ul>
        </div>

        <div class="information">
            <iframe name="content-frame" src="iframecontent.html"></iframe>
        </div>

</body>

</html>
