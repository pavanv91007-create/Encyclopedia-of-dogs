<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Premium Dog Breeds Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff7f0, #e8f0ff);
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #333;
    }

    /* Search */
    .search-row {
      margin: 20px auto;
      max-width: 600px;
      display: flex;
      gap: 10px;
    }

    .search-row input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid #ccc;
      outline: none;
    }

    .search-row button {
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      background: #ff8a5c;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .08);
      display: flex;
      flex-direction: column;
      transition: .3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, .15);
    }

    .card-img-wrap {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #f7efe6, #e8f0ff);
      overflow: hidden;
      position: relative;
    }

    .card-img-wrap::before {
      content: "Loading image...";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #7a6d62;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .card-img-wrap.loaded::before {
      content: "";
    }

    .card-img-wrap.placeholder::before {
      content: attr(data-label);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #7a6d62;
      font-size: 0.95rem;
      font-weight: 700;
      text-align: center;
      padding: 18px;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity .25s ease;
    }

    .card-img-wrap.loaded img {
      opacity: 1;
    }

    .card-body {
      padding: 15px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 5px;
    }

    .card-meta {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 6px;
      line-height: 1.3;
      white-space: pre-line;
    }

    .card-desc {
      font-size: 0.8rem;
      color: #555;
      font-style: italic;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .price {
      font-size: 1.15rem;
      font-weight: 700;
      color: #ff6a3a;
      margin-bottom: 12px;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }

    .buy-btn {
      flex: 1.2;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #28a745;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .cart-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #28a745;
      border-radius: 8px;
      background: transparent;
      color: #28a745;
      font-weight: 600;
      cursor: pointer;
    }

    .buy-btn:hover {
      background: #218838;
    }

    .cart-btn:hover {
      background: #f0fff4;
    }

    /* Floating Cart -->
    #floatingCart {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #ff8a5c;
      color: white;
      padding: 15px 25px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      font-weight: bold;
      z-index: 99;
      transition: 0.3s;
    }

    #floatingCart:hover {
      transform: scale(1.05);
      background: #ff7640;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 100%;
      max-width: 550px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #999;
    }

    /* Form */
    form {
      display: grid;
      gap: 12px;
      margin-top: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #444;
    }

    .form-group input,
    .form-group select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline-color: #ff8a5c;
    }

    .submit-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 10px;
    }

    .cart-item-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <header>
      <h1>Premium Dog Breeds Store</h1>
      <p>Verified breeds with health certifications and instant delivery.</p>
    </header>

    <div class="search-row">
      <input id="searchInput" type="text" placeholder="Search breed name...">
      <button id="clearBtn">Clear</button>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <!-- Floating Cart -->
  <div id="floatingCart" onclick="openCartView()">View Cart (0)</div>

  <!-- Checkout Modal -->
  <div id="checkoutModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <h2 id="modalTitle">Checkout</h2>

      <div id="cartSummary"
        style="margin: 15px 0; padding: 10px; background: #fdfdfd; border: 1px solid #eee; border-radius: 8px;"></div>

      <form id="checkoutForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="custName" required minlength="3" placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="custEmail" required placeholder="name@email.com">
        </div>
        <div class="form-group">
          <label>Shipping Address</label>
          <input type="text" id="custAddress" required placeholder="Flat, Street, Area">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group">
            <label>City</label>
            <input type="text" id="custCity" required>
          </div>
          <div class="form-group">
            <label>State</label>
            <input type="text" id="custState" required>
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group">
            <label>Pincode</label>
            <input type="text" id="custPin" required pattern="[0-9]{6}" title="6 digit pincode">
          </div>
          <div class="form-group">
            <label>Preferred Gender</label>
            <select id="dogGender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="No Preference">No Preference</option>
            </select>
          </div>
        </div>
        <button type="submit" class="submit-btn">Proceed to Payment</button>
      </form>
    </div>
  </div>

      { n: "Siberian Husky", g: "Working", p: 95000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Siberian+Husky", l: "12-14 yrs", h: "20-24 in", w: "35-60 lbs", t: "Friendly, outgoing", desc: "Siberian sled dog with striking blue eyes. Endurance athlete.", wiki: "Siberian_Husky" },

      { n: "Chow Chow", g: "Non-Sporting", p: 110000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Chow+Chow", l: "9-15 yrs", h: "17-20 in", w: "45-70 lbs", t: "Loyal, aloof", desc: "Ancient Chinese breed with blue-black tongue. Cat-like.", wiki: "Chow_Chow", photo: "https://images.dog.ceo/breeds/chow/n02112137_7302.jpg" },
      { n: "Border Collie", g: "Herding", p: 80000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Border+Collie", l: "12-15 yrs", h: "18-22 in", w: "30-45 lbs", t: "Intelligent, energetic", desc: "Ultimate herding dog from Scotland. Workaholic genius.", wiki: "Border_Collie", photo: "https://images.dog.ceo/breeds/collie-border/n02106166_1796.jpg" },
      { n: "Saint Bernard", g: "Working", p: 140000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Saint+Bernard", l: "8-10 yrs", h: "26-30 in", w: "120-180 lbs", t: "Gentle, friendly", desc: "Alpine rescue dog famous for brandy barrel. Massive savior.", wiki: "St._Bernard_(dog_breed)", photo: "https://images.dog.ceo/breeds/stbernard/n02109525_10743.jpg" }
    ];

    let cart = [];
    const imageMemoryCache = new Map();
    let renderToken = 0;

    function getPlaceholderImage(breedName) {
      const label = breedName
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#fff3e8"/>
            <stop offset="1" stop-color="#dceaff"/>
          </linearGradient>
        </defs>
        <rect width="640" height="360" fill="url(#bg)"/>
        <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="#7a6d62" font-family="Arial, sans-serif" font-size="28" font-weight="700">${label}</text>
      </svg>`;

      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function getReliableImageUrl(imageUrl) {
      const withoutProtocol = imageUrl.replace(/^https?:\/\//, "");
      return `https://images.weserv.nl/?url=${encodeURIComponent(withoutProtocol)}`;
    }

    async function getDogImage(breed) {
      const cacheKey = 'wikiDogImg_v3_' + breed.wiki;
      if (imageMemoryCache.has(cacheKey)) return imageMemoryCache.get(cacheKey);

      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        imageMemoryCache.set(cacheKey, cached);
        return cached;
      }

      if (breed.photo) {
        localStorage.setItem(cacheKey, breed.photo);
        imageMemoryCache.set(cacheKey, breed.photo);
        return breed.photo;
      }

      try {
        const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(breed.wiki)}`);
        if (!response.ok) throw new Error(`Wikipedia API returned ${response.status}`);

        const data = await response.json();
        const imageUrl = data.thumbnail?.source || data.originalimage?.source;
        if (!imageUrl) throw new Error("No Wikipedia thumbnail available");

        const reliableUrl = getReliableImageUrl(imageUrl);
        localStorage.setItem(cacheKey, reliableUrl);
        imageMemoryCache.set(cacheKey, reliableUrl);
        return reliableUrl;
      } catch (err) {
        const fallbackUrl = getPlaceholderImage(breed.n);
        imageMemoryCache.set(cacheKey, fallbackUrl);
        return fallbackUrl;
      }
    }
    function updateCartUI() {
      const btn = document.getElementById('floatingCart');
      btn.innerText = `View Cart (${cart.length})`;
    }

    function addToCart(index) {
      cart.push(breeds[index]);
      updateCartUI();
      alert(breeds[index].n + " added to cart!");
    }

    function buyNow(index) {
      cart = [breeds[index]];
      updateCartUI();
      openCartView();
    }

    function removeFromCart(i) {
      cart.splice(i, 1);
      updateCartUI();
      if (cart.length === 0) closeModal();
      else openCartView();
    }

    function openCartView() {
      if (cart.length === 0) return alert("Your cart is empty!");

      const summary = document.getElementById('cartSummary');
      let total = 0;
      summary.innerHTML = "<strong>Order Items:</strong><br>";

      cart.forEach((item, i) => {
        total += item.p;
        summary.innerHTML += `
            <div class="cart-item-row">
                <span>${item.n}</span>
                <span>Rs ${item.p.toLocaleString()} <button onclick="removeFromCart(${i})" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">[x]</button></span>
            </div>`;
      });

      summary.innerHTML += `<div style="text-align:right; margin-top:10px; font-weight:bold; font-size:1.1rem; color:#ff6a3a;">Total: Rs ${total.toLocaleString()}</div>`;

      document.getElementById('modalTitle').innerText = "Complete Your Purchase";
      document.getElementById('checkoutModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('checkoutModal').style.display = 'none';
    }

    document.getElementById('checkoutForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('custName').value;
      alert(`Order Placed Successfully!\n\nThank you ${name}. Our representative will contact you for the payment of Rs ${cart.reduce((a, b) => a + b.p, 0).toLocaleString()}.`);
      cart = [];
      updateCartUI();
      closeModal();
    });

    function setCardImage(card, imageUrl) {
      const imgElement = card.querySelector("img");
      const wrap = card.querySelector(".card-img-wrap");
      if (!imgElement || !wrap) return;

      let finished = false;
      const finish = (usePlaceholder) => {
        if (finished) return;
        finished = true;
        if (usePlaceholder) {
          imgElement.remove();
          wrap.classList.add("placeholder");
        }
        wrap.classList.add("loaded");
      };
      const fallbackTimer = setTimeout(() => finish(true), 20000);

      imgElement.onload = () => {
        clearTimeout(fallbackTimer);
        finish(false);
      };
      imgElement.onerror = () => {
        clearTimeout(fallbackTimer);
        finish(true);
      };
      imgElement.src = imageUrl;
    }

    function loadVisibleImages(list, token) {
      list.forEach(async (breed) => {
        const imageUrl = await getDogImage(breed);
        if (token !== renderToken) return;

        const card = Array.from(document.getElementById("grid").children).find(item => item.dataset.wiki === breed.wiki);
        if (card) setCardImage(card, imageUrl);
      });
    }

    function render(list) {
      renderToken += 1;
      const token = renderToken;
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      list.forEach((b) => {
        const originalIndex = breeds.findIndex(item => item.n === b.n);
        const cacheKey = 'wikiDogImg_v3_' + b.wiki;
        const cachedUrl = localStorage.getItem(cacheKey);
        const imgSrc = cachedUrl || getPlaceholderImage(b.n);
        const loadedClass = cachedUrl ? " loaded" : "";

        const c = document.createElement("div");
        c.className = "card";
        c.dataset.wiki = b.wiki;
        c.innerHTML = `
            <div class="card-img-wrap${loadedClass}" data-label="${b.n}"><img src="${imgSrc}" alt="${b.n}"></div>
            <div class="card-body">
                <div class="card-title">${b.n}</div>
                <div class="card-meta">
<strong>Group:</strong> ${b.g}\n<strong>H:</strong> ${b.h} | <strong>W:</strong> ${b.w}\n<strong>Life:</strong> ${b.l}
                </div>
                <div class="card-desc">${b.desc}</div>
                <div class="price">Rs ${b.p.toLocaleString()}</div>
                <div class="btn-group">
                    <button class="cart-btn" onclick="addToCart(${originalIndex})">Add to Cart</button>
                    <button class="buy-btn" onclick="buyNow(${originalIndex})">Buy Now</button>
                </div>
            </div>
        `;
        grid.appendChild(c);
      });
      loadVisibleImages(list, token);
    }
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = breeds.filter(b => b.n.toLowerCase().includes(q));
      render(filtered);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = "";
      render(breeds);
    });

    // Init: render immediately, then load images in parallel.
    window.addEventListener('load', () => {
      render(breeds);
    });
  </script>

</body>

</html>
