<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Premium Dog Breeds Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff7f0, #e8f0ff);
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #333;
    }

    /* Search */
    .search-row {
      margin: 20px auto;
      max-width: 600px;
      display: flex;
      gap: 10px;
    }

    .search-row input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid #ccc;
      outline: none;
    }

    .search-row button {
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      background: #ff8a5c;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .08);
      display: flex;
      flex-direction: column;
      transition: .3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, .15);
    }

    .card-img-wrap {
      width: 100%;
      height: 180px;
      background: #eee;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 15px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 5px;
    }

    .card-meta {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 6px;
      line-height: 1.3;
      white-space: pre-line;
    }

    .card-desc {
      font-size: 0.8rem;
      color: #555;
      font-style: italic;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .price {
      font-size: 1.15rem;
      font-weight: 700;
      color: #ff6a3a;
      margin-bottom: 12px;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }

    .buy-btn {
      flex: 1.2;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #28a745;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .cart-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #28a745;
      border-radius: 8px;
      background: transparent;
      color: #28a745;
      font-weight: 600;
      cursor: pointer;
    }

    .buy-btn:hover {
      background: #218838;
    }

    .cart-btn:hover {
      background: #f0fff4;
    }

    /* Floating Cart -->
    #floatingCart {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #ff8a5c;
      color: white;
      padding: 15px 25px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      font-weight: bold;
      z-index: 99;
      transition: 0.3s;
    }

    #floatingCart:hover {
      transform: scale(1.05);
      background: #ff7640;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 100%;
      max-width: 550px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #999;
    }

    /* Form */
    form {
      display: grid;
      gap: 12px;
      margin-top: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #444;
    }

    .form-group input,
    .form-group select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline-color: #ff8a5c;
    }

    .submit-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 10px;
    }

    .cart-item-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <header>
      <h1>Premium Dog Breeds Store</h1>
      <p>Verified breeds with health certifications and instant delivery.</p>
    </header>

    <div class="search-row">
      <input id="searchInput" type="text" placeholder="Search breed name...">
      <button id="clearBtn">Clear</button>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <!-- Floating Cart -->
  <div id="floatingCart" onclick="openCartView()">View Cart (0)</div>

  <!-- Checkout Modal -->
  <div id="checkoutModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <h2 id="modalTitle">Checkout</h2>

      <div id="cartSummary"
        style="margin: 15px 0; padding: 10px; background: #fdfdfd; border: 1px solid #eee; border-radius: 8px;"></div>

      <form id="checkoutForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="custName" required minlength="3" placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="custEmail" required placeholder="name@email.com">
        </div>
        <div class="form-group">
          <label>Shipping Address</label>
          <input type="text" id="custAddress" required placeholder="Flat, Street, Area">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group">
            <label>City</label>
            <input type="text" id="custCity" required>
          </div>
          <div class="form-group">
            <label>State</label>
            <input type="text" id="custState" required>
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="form-group">
            <label>Pincode</label>
            <input type="text" id="custPin" required pattern="[0-9]{6}" title="6 digit pincode">
          </div>
          <div class="form-group">
            <label>Preferred Gender</label>
            <select id="dogGender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="No Preference">No Preference</option>
            </select>
          </div>
        </div>
        <button type="submit" class="submit-btn">Proceed to Payment</button>
      </form>
    </div>
  </div>

  <script>
const breeds = [
      { n: "Labrador Retriever", g: "Sporting", p: 55000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Labrador+Retriever", l: "10-12 yrs", h: "21-25 in", w: "55-80 lbs", t: "Friendly, outgoing", desc: "Loyal family dog from Canada, loves water and play. Excellent with kids." },
      { n: "German Shepherd", g: "Herding", p: 65000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=German+Shepherd", l: "7-10 yrs", h: "22-26 in", w: "50-90 lbs", t: "Intelligent, loyal", desc: "Fearless protector originally bred for herding sheep in Germany." },
      { n: "Golden Retriever", g: "Sporting", p: 70000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Golden+Retriever", l: "10-12 yrs", h: "21-24 in", w: "55-75 lbs", t: "Friendly, devoted", desc: "Iconic Scottish retriever famed for retrieving game. Therapy dog favorite." },
      { n: "Shih Tzu", g: "Companion", p: 45000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Shih+Tzu", l: "10-18 yrs", h: "9-10 in", w: "9-16 lbs", t: "Affectionate, lively", desc: "Ancient Chinese lion dog with flowing coat. Perfect lap companion." },
      { n: "Beagle", g: "Hound", p: 40000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Beagle", l: "10-15 yrs", h: "13-15 in", w: "20-30 lbs", t: "Merry, friendly", desc: "English scent hound with soulful eyes. Famous for baying howl." },
      { n: "Indian Spitz", g: "Companion", p: 18000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Indian+Spitz", l: "10-14 yrs", h: "9-12 in", w: "11-22 lbs", t: "Playful, alert", desc: "Fluffy Indian companion breed, adapts to hot climate perfectly." },
      { n: "Pug", g: "Companion", p: 35000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Pug", l: "13-15 yrs", h: "10-13 in", w: "14-18 lbs", t: "Charming, mischievous", desc: "Chinese pug with wrinkled face. Loves food and cuddles." },
      { n: "Rottweiler", g: "Working", p: 85000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Rottweiler", l: "8-10 yrs", h: "22-27 in", w: "80-135 lbs", t: "Loyal, confident", desc: "German guard dog with powerful build. Excellent family protector." },
      { n: "Dobermann", g: "Working", p: 60000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Dobermann", l: "10-12 yrs", h: "24-28 in", w: "60-100 lbs", t: "Fearless, alert", desc: "Sleek German Pinscher descendant. Velcro dog that bonds deeply." },
      { n: "Pomeranian", g: "Toy", p: 25000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Pomeranian", l: "12-16 yrs", h: "8-11 in", w: "3-7 lbs", t: "Bold, lively", desc: "Fox-like Spitz from Pomerania region. Big personality in tiny body." },
      { n: "Cocker Spaniel", g: "Sporting", p: 50000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Cocker+Spaniel", l: "10-14 yrs", h: "14-15 in", w: "20-30 lbs", t: "Gentle, affectionate", desc: "Elegant English gun dog with silky coat. Merry hunting companion." },
      { n: "Siberian Husky", g: "Working", p: 95000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Siberian+Husky", l: "12-14 yrs", h: "20-24 in", w: "35-60 lbs", t: "Friendly, outgoing", desc: "Siberian sled dog with striking blue eyes. Endurance athlete." },
      { n: "French Bulldog", g: "Companion", p: 120000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=French+Bulldog", l: "10-12 yrs", h: "11-12 in", w: "20-28 lbs", t: "Playful, smart", desc: "Bat-eared Parisian companion. Low exercise, high love needs." },
      { n: "Boxer", g: "Working", p: 58000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Boxer", l: "10-12 yrs", h: "21-25 in", w: "55-70 lbs", t: "Bright, fun-loving", desc: "German breed with bouncy personality. Great with children." },
      { n: "Great Dane", g: "Working", p: 90000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Great+Dane", l: "7-10 yrs", h: "28-34 in", w: "100-200 lbs", t: "Gentle, friendly", desc: "Apollo of dogs from Germany. Gentle giant despite size." },
      { n: "Dachshund", g: "Hound", p: 48000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Dachshund", l: "12-16 yrs", h: "8-9 in", w: "16-32 lbs", t: "Clever, lively", desc: "German badger hound with long body. Bold hunter heart." },
      { n: "Indian Pariah", g: "Primitive", p: 12000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Indian+Pariah", l: "10-13 yrs", h: "19-23 in", w: "30-60 lbs", t: "Loyal, adaptable", desc: "Native Indian street dog, disease resistant. Excellent guard." },
      { n: "Chihuahua", g: "Toy", p: 42000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Chihuahua", l: "14-16 yrs", h: "6-9 in", w: "2-6 lbs", t: "Alert, courageous", desc: "Mexican tiniest breed. Big personality protector." },
      { n: "Bullmastiff", g: "Working", p: 88000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Bullmastiff", l: "8-10 yrs", h: "24-27 in", w: "100-130 lbs", t: "Docile, loyal", desc: "Victorian gamekeeper's night dog. Silent guardian." },
      { n: "Tibetan Mastiff", g: "Working", p: 250000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Tibetan+Mastiff", l: "10-14 yrs", h: "24-26 in", w: "70-150 lbs", t: "Independent, protective", desc: "Ancient Tibetan livestock guardian. Lion-like mane." },
      { n: "Rajapalayam", g: "Sighthound", p: 30000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Rajapalayam", l: "9-13 yrs", h: "23-26 in", w: "61-88 lbs", t: "Loyal, strong", desc: "South Indian hunting dog, heat tolerant. Royal breed." },
      { n: "Poodle", g: "Non-Sporting", p: 75000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Poodle", l: "12-15 yrs", h: "15-27 in", w: "10-70 lbs", t: "Intelligent, active", desc: "French water retriever with curly hypoallergenic coat." },
      { n: "Chow Chow", g: "Non-Sporting", p: 110000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Chow+Chow", l: "9-15 yrs", h: "17-20 in", w: "45-70 lbs", t: "Loyal, aloof", desc: "Ancient Chinese breed with blue-black tongue. Cat-like." },
      { n: "Border Collie", g: "Herding", p: 80000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Border+Collie", l: "12-15 yrs", h: "18-22 in", w: "30-45 lbs", t: "Intelligent, energetic", desc: "Ultimate herding dog from Scotland. Workaholic genius." },
      { n: "Saint Bernard", g: "Working", p: 140000, i: "https://via.placeholder.com/400x200/FFE4E1/8B4513?text=Saint+Bernard", l: "8-10 yrs", h: "26-30 in", w: "120-180 lbs", t: "Gentle, friendly", desc: "Alpine rescue dog famous for brandy barrel. Massive savior." }
    ];

    let cart = [];

    // API from indian.html for images
    async function getDogImage(breedName) {
      const cacheKey = 'dogImg_' + breedName;
      const cached = localStorage.getItem(cacheKey);
      if (cached) return cached;

      try {
        const queryName = breedName.toLowerCase().split(' ').reverse().join('/');
        const response = await fetch(`https://dog.ceo/api/breed/${queryName}/images/random`);
        const data = await response.json();

        if (data.status === "success") {
          localStorage.setItem(cacheKey, data.message);
          return data.message;
        } else {
          const fallback = await fetch('https://dog.ceo/api/breeds/image/random');
          const fallbackData = await fallback.json();
          localStorage.setItem(cacheKey, fallbackData.message);
          return fallbackData.message;
        }
      } catch (err) {
        const fallbackUrl = "https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=400&h=200";
        localStorage.setItem(cacheKey, fallbackUrl);
        return fallbackUrl;
      }
    }

    // Pre-fetch all images on load (background, non-blocking)
    async function preloadImages() {
      for (const b of breeds) {
        getDogImage(b.n);  // Fire and forget, cache if not exists
      }
    }

    function updateCartUI() {
      const btn = document.getElementById('floatingCart');
      btn.innerText = `View Cart (${cart.length})`;
    }

    function addToCart(index) {
      cart.push(breeds[index]);
      updateCartUI();
      alert(breeds[index].n + " added to cart!");
    }

    function buyNow(index) {
      cart = [breeds[index]];
      updateCartUI();
      openCartView();
    }

    function removeFromCart(i) {
      cart.splice(i, 1);
      updateCartUI();
      if (cart.length === 0) closeModal();
      else openCartView();
    }

    function openCartView() {
      if (cart.length === 0) return alert("Your cart is empty!");

      const summary = document.getElementById('cartSummary');
      let total = 0;
      summary.innerHTML = "<strong>Order Items:</strong><br>";

      cart.forEach((item, i) => {
        total += item.p;
        summary.innerHTML += `
            <div class="cart-item-row">
                <span>${item.n}</span>
                <span>Rs ${item.p.toLocaleString()} <button onclick="removeFromCart(${i})" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">[x]</button></span>
            </div>`;
      });

      summary.innerHTML += `<div style="text-align:right; margin-top:10px; font-weight:bold; font-size:1.1rem; color:#ff6a3a;">Total: Rs ${total.toLocaleString()}</div>`;

      document.getElementById('modalTitle').innerText = "Complete Your Purchase";
      document.getElementById('checkoutModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('checkoutModal').style.display = 'none';
    }

    document.getElementById('checkoutForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('custName').value;
      alert(`Order Placed Successfully!\n\nThank you ${name}. Our representative will contact you for the payment of Rs ${cart.reduce((a, b) => a + b.p, 0).toLocaleString()}.`);
      cart = [];
      updateCartUI();
      closeModal();
    });

    function render(list) {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      list.forEach((b) => {
        const originalIndex = breeds.findIndex(item => item.n === b.n);
        const cacheKey = 'dogImg_' + b.n;
        const imgSrc = localStorage.getItem(cacheKey) || b.i;  // Cached or placeholder - static!

        const c = document.createElement("div");
        c.className = "card";
        c.innerHTML = `
            <div class="card-img-wrap"><img src="${imgSrc}" alt="${b.n}" loading="lazy"></div>
            <div class="card-body">
                <div class="card-title">${b.n}</div>
                <div class="card-meta">
<strong>Group:</strong> ${b.g}\n<strong>H:</strong> ${b.h} | <strong>W:</strong> ${b.w}\n<strong>Life:</strong> ${b.l}
                </div>
                <div class="card-desc">${b.desc}</div>
                <div class="price">Rs ${b.p.toLocaleString()}</div>
                <div class="btn-group">
                    <button class="cart-btn" onclick="addToCart(${originalIndex})">Add to Cart</button>
                    <button class="buy-btn" onclick="buyNow(${originalIndex})">Buy Now</button>
                </div>
            </div>
        `;
        grid.appendChild(c);
      });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = breeds.filter(b => b.n.toLowerCase().includes(q));
      render(filtered);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = "";
      render(breeds);
    });

    // Init: preload then render
    window.addEventListener('load', async () => {
      await preloadImages();
      render(breeds);
    });
  </script>

</body>

</html>
